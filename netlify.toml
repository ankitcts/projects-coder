[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  NODE_ENV = "production"
  NPM_FLAGS = "--include=dev"
  REACT_APP_API_BASE_URL = "https://projects-coder.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://projects-coder.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
