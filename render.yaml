services:
  - type: web
    name: projects-coder-api
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: projectCoder
      - key: ALLOWED_ORIGINS
        sync: false
